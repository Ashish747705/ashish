<html>
<head>
<title>Video Editing</title>

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #000;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* CARD STYLE (same as work section) */
.work-card {
  position: relative;
  width: 320px;
  border-radius: 20px;
  overflow: hidden;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  border: 1px solid rgba(255,255,255,0.1);
  padding: 25px;
  text-align: center;
  transition: 0.4s;
}

.work-card:hover {
  transform: translateY(-10px) scale(1.03);
  box-shadow: 0 0 30px rgba(255,100,0,0.4);
}

/* TEXT */
.work-card p {
  opacity: 0.8;
  margin-bottom: 20px;
}

/* BUTTON */
.work-card button {
  padding: 10px 20px;
  background: linear-gradient(45deg, orange, red);
  border: none;
  border-radius: 20px;
  cursor: pointer;
  color: white;
  font-size: 14px;
  transition: 0.3s;
}

.work-card button:hover {
  transform: scale(1.05);
}
</style>

</head>

<body>

<div class="work-card">
  <h2>Video Editing</h2>
  <p>My all video editing work on insatagram, you will my work by visiting my instagram page </p>
  
  <a href="https://www.instagram.com/smitt.editss?igsh=dHJuN3d2MGRwbWF3" target="_blank">
    <button>View Project</button>

  
</div>

</body>
</html>
